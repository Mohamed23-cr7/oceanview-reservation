<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Add Reservation</title>
  <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
  <div class="navbar">
    <div class="inner">
      <div class="brand">Ocean View Resort </div>
      <div class="navlinks">
        <a href="dashboard.html">Dashboard</a>
        <a href="about.html">About</a>
        <a href="reservations.html">View Reservations</a>
        <a href="add-reservation.html">Add Reservation</a>
        <a href="rooms.html">Room Details</a>
        <a href="help.html">Help</a>
        <a href="contact.html">Contact</a>
        <a href="#" id="logoutLink">Logout</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2>Add New Reservation</h2>
      <p class="small">Enter customer details and booking dates.</p>

      <div id="msg"></div>

      <div class="row">
        <div class="col">
          <label>Guest Name</label>
          <input id="guest_name" type="text" placeholder="Customer name"/>
        </div>
        <div class="col">
          <label>Contact Number</label>
          <input id="contact_number" type="text" placeholder="+94..."/>
        </div>
      </div>

      <label>Address</label>
      <textarea id="address" placeholder="Customer address"></textarea>

      <div class="row">
        <div class="col">
          <label>Room Type</label>
          <select id="room_id"></select>
        </div>
        <div class="col">
          <label>Check-in</label>
          <input id="check_in" type="date"/>
        </div>
        <div class="col">
          <label>Check-out</label>
          <input id="check_out" type="date"/>
        </div>
      </div>

      <div style="margin-top:12px" class="top-actions">
        <button class="btn" id="saveBtn">Save Reservation</button>
        <a class="btn secondary" href="reservations.html">View Reservations</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { mountNavbar } from "./assets/app.js";
    import { apiFetch } from "./assets/auth.js";
    mountNavbar();

    const msg = document.getElementById("msg");
    const show = (t, type="error") => msg.innerHTML = `<div class="alert ${type}">${t}</div>`;

    async function loadRooms(){
      const rooms = await apiFetch("/rooms");
      const sel = document.getElementById("room_id");
      sel.innerHTML = rooms.map(r => `
        <option value="${r.id}">${r.room_type} — LKR ${Number(r.rate_per_night).toFixed(2)}/night</option>
      `).join("");
    }

    document.getElementById("saveBtn").addEventListener("click", async ()=>{
      const payload = {
        guest_name: document.getElementById("guest_name").value.trim(),
        address: document.getElementById("address").value.trim(),
        contact_number: document.getElementById("contact_number").value.trim(),
        room_id: Number(document.getElementById("room_id").value),
        check_in: document.getElementById("check_in").value,
        check_out: document.getElementById("check_out").value
      };

      try{
        const saved = await apiFetch("/reservations", {
          method:"POST",
          body: JSON.stringify(payload)
        });
        show(`Saved! Reservation #: <b>${saved.reservation_number}</b> | Total: <b>LKR ${Number(saved.total_amount).toFixed(2)}</b>`, "success");
      }catch(e){
        show(e.message, "error");
      }
    });

    loadRooms().catch(e=>show(e.message));
  </script>
</body>
</html>

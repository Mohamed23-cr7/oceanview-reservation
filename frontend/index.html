<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ocean View Resort | Login</title>
  <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
  <div class="center">
    <div class="auth-box card">
      <h1>Ocean View Resort</h1>
      <p class="small">Secure staff login</p>

      <div id="msg"></div>

      <label>Email</label>
      <input id="email" type="email" placeholder="name@example.com"/>

      <label>Password</label>
      <input id="password" type="password" placeholder="********"/>

      <div style="margin-top:14px" class="top-actions">
        <button class="btn" id="loginBtn">Login</button>
        <a class="btn secondary" href="register.html">Create account</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { apiFetch, setSession, getToken } from "./assets/auth.js";
    if(getToken()) window.location.href = "dashboard.html";

    const msg = document.getElementById("msg");
    const show = (t, type="error") => msg.innerHTML = `<div class="alert ${type}">${t}</div>`;

    document.getElementById("loginBtn").addEventListener("click", async ()=>{
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if(!email || !password) return show("Please enter email and password.");

      try{
        const data = await apiFetch("/auth/login", {
          method:"POST",
          body: JSON.stringify({ email, password })
        });
        setSession(data.token, data.user);
        window.location.href = "dashboard.html";
      }catch(e){
        show(e.message);
      }
    });
  </script>
</body>
</html>

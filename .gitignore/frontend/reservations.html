<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>View Reservations</title>
  <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
  <div class="navbar">
    <div class="inner">
      <div class="brand">Ocean View Resort </div>
      <div class="navlinks">
        <a href="dashboard.html">Dashboard</a>
        <a href="about.html">About</a>
        <a href="reservations.html">View Reservations</a>
        <a href="add-reservation.html">Add Reservation</a>
        <a href="rooms.html">Room Details</a>
        <a href="help.html">Help</a>
        <a href="contact.html">Contact</a>
        <a href="#" id="logoutLink">Logout</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="top-actions">
        <div>
          <h2>Reservations</h2>
          <p class="small">Search by reservation number, guest name, or room type.</p>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap">
          <input id="q" placeholder="Search..." style="max-width:260px"/>
          <button class="btn" id="searchBtn">Search</button>
        </div>
      </div>

      <div id="msg"></div>

      <div class="table-wrap">
        <table class="table" id="table">
          <thead>
            <tr>
              <th>Reservation #</th>
              <th>Guest</th>
              <th>Room</th>
              <th>Check-in</th>
              <th>Check-out</th>
              <th>Nights</th>
              <th>Total</th>
              <th>Open</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="card" style="margin-top:16px" id="detailCard" hidden>
      <h2>Reservation Full Details</h2>
      <div id="details" class="small"></div>
      <button class="btn" id="printBtn" style="margin-top:12px">Print Bill</button>
    </div>
  </div>

  <script type="module">
    import { mountNavbar } from "./assets/app.js";
    import { loadReservations, getReservationDetail } from "./assets/reservations.js";
    mountNavbar();

    const msg = document.getElementById("msg");
    const show = (t, type="error") => msg.innerHTML = `<div class="alert ${type}">${t}</div>`;

    const tbody = document.querySelector("#table tbody");
    const detailCard = document.getElementById("detailCard");
    const details = document.getElementById("details");
    const printBtn = document.getElementById("printBtn");

    async function renderList(q=""){
      msg.innerHTML = "";
      const rows = await loadReservations(q);
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.reservation_number}</td>
          <td>${r.guest_name}</td>
          <td>${r.room_type}</td>
          <td>${r.check_in}</td>
          <td>${r.check_out}</td>
          <td>${r.nights}</td>
          <td>LKR ${Number(r.total_amount).toFixed(2)}</td>
          <td><button class="btn secondary" data-open="${r.reservation_number}">Open</button></td>
        </tr>
      `).join("");

      tbody.querySelectorAll("button[data-open]").forEach(btn=>{
        btn.addEventListener("click", ()=> openDetail(btn.dataset.open));
      });
    }

    async function openDetail(resNo){
      const d = await getReservationDetail(resNo);
      detailCard.hidden = false;

      details.innerHTML = `
        <div><b>Reservation #:</b> ${d.reservation_number}</div>
        <div><b>Guest Name:</b> ${d.guest_name}</div>
        <div><b>Address:</b> ${d.address}</div>
        <div><b>Contact:</b> ${d.contact_number}</div>
        <hr/>
        <div><b>Room Type:</b> ${d.room_type}</div>
        <div><b>Rate:</b> LKR ${Number(d.rate_per_night).toFixed(2)} / night</div>
        <div><b>Check-in:</b> ${d.check_in}</div>
        <div><b>Check-out:</b> ${d.check_out}</div>
        <div><b>Nights:</b> ${d.nights}</div>
        <hr/>
        <div><b>Total Bill:</b> LKR ${Number(d.total_amount).toFixed(2)}</div>
        <div class="small"><b>Created by:</b> ${d.created_by_name} | ${d.created_at}</div>
      `;
    }

    document.getElementById("searchBtn").addEventListener("click", ()=>{
      renderList(document.getElementById("q").value.trim()).catch(e=>show(e.message));
    });

    printBtn.addEventListener("click", ()=> window.print());

    // open details from querystring (?open=RES_NO)
    const params = new URLSearchParams(location.search);
    const open = params.get("open");

    renderList().then(()=> {
      if(open) openDetail(open).catch(()=>{});
    }).catch(e=>show(e.message));
  </script>
</body>
</html>
